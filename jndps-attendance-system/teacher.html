<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard | JNDPS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <!-- Libraries -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body class="bg-[#0D0D0D] text-white pb-24">

    <!-- Header -->
    <header class="p-6 flex justify-between items-center glass mb-6">
        <div>
            <h1 class="text-lg font-bold">Staff Portal</h1>
            <p id="welcomeMsg" class="text-xs text-gray-400">Loading profile...</p>
        </div>
        <button id="logoutBtn" class="text-red-500 text-sm">Logout</button>
    </header>

    <main class="px-4 space-y-6">
        <!-- Attendance Section -->
        <div class="glass-card p-6 fade-in">
            <h2 class="text-center text-sm font-medium text-gray-400 mb-4 uppercase tracking-widest">Mark Attendance</h2>
            
            <div class="relative rounded-2xl overflow-hidden bg-black aspect-[3/4] mb-6">
                <video id="video" autoplay muted playsinline class="w-full h-full object-cover grayscale-[0.3]"></video>
                <div id="cameraShield" class="absolute inset-0 flex items-center justify-center bg-black/80 z-10 transition-opacity">
                    <p class="text-xs text-gray-400">Camera Off</p>
                </div>
                <div id="statusOverlay" class="absolute top-4 left-4 right-4 text-xs bg-black/50 p-2 rounded-lg text-center hidden">
                    Processing Face...
                </div>
            </div>

            <button id="markBtn" class="w-full btn-primary py-4 text-lg">
                Mark Attendance
            </button>
            <p id="feedback" class="text-center text-xs mt-4 text-gray-500"></p>
        </div>

        <!-- My Stats Widget -->
        <div class="grid grid-cols-2 gap-4 slide-up">
            <div class="stat-widget">
                <div id="presentDays" class="stat-value">0</div>
                <div class="stat-label">Present</div>
            </div>
            <div class="stat-widget">
                <div id="absentDays" class="stat-value">0</div>
                <div class="stat-label">Absent</div>
            </div>
        </div>
    </main>

    <!-- Mobile Nav -->
    <nav class="mobile-nav">
        <a href="#" class="nav-item active">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Home</span>
        </a>
        <a href="#" class="nav-item">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <span>History</span>
        </a>
        <a href="#" class="nav-item">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <span>Profile</span>
        </a>
    </nav>

    <script type="module">
        import { auth, db } from './js/auth.js';
        import { loadFaceModels } from './js/face-verification.js';
        import { markAttendanceFlow } from './js/attendance.js';
        import { initAnimations } from './js/app.js';

        const video = document.getElementById('video');
        const markBtn = document.getElementById('markBtn');
        const feedback = document.getElementById('feedback');
        let currentTeacher = null;

        initAnimations();

        // 1. Auth check
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            
            // Fetch teacher profile
            const doc = await firebase.firestore().collection('teachers').doc(user.uid).get();
            if (doc.exists) {
                currentTeacher = { id: user.uid, ...doc.data() };
                document.getElementById('welcomeMsg').innerText = `Welcome, ${currentTeacher.name}`;
                startCamera();
                loadFaceModels(); // Load in background
            }
        });

        // 2. Camera Setup
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                video.srcObject = stream;
                document.getElementById('cameraShield').style.opacity = '0';
                setTimeout(() => document.getElementById('cameraShield').classList.add('hidden'), 300);
            } catch (err) {
                feedback.innerText = "Camera access denied. Please enable camera.";
                feedback.classList.replace('text-gray-500', 'text-red-500');
            }
        }

        // 3. Mark Attendance Action
        markBtn.addEventListener('click', async () => {
            if (!currentTeacher) return;
            
            markBtn.disabled = true;
            markBtn.innerText = "Verifying...";
            document.getElementById('statusOverlay').classList.remove('hidden');

            const result = await markAttendanceFlow(video, currentTeacher);
            
            document.getElementById('statusOverlay').classList.add('hidden');
            feedback.innerText = result.message;
            feedback.className = result.success ? "text-center text-xs mt-4 text-green-500" : "text-center text-xs mt-4 text-red-500";

            if (result.success) {
                gsap.to(markBtn, { backgroundColor: "#22c55e", duration: 0.5 });
                markBtn.innerText = "Attended Today";
            } else {
                markBtn.disabled = false;
                markBtn.innerText = "Try Again";
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
             auth.signOut().then(() => window.location.href = 'login.html');
        });
    </script>
</body>
</html>
