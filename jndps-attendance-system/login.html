<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | JNDPS Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="glass-card attendance-card max-w-md w-full fade-in">
        <h2 class="text-xl font-semibold mb-6 text-center">Staff Login</h2>
        
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm text-gray-400 mb-1">Email / Username</label>
                <input type="text" id="email" required placeholder="name@example.com"
                    class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-red-500 transition-colors">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">Password</label>
                <input type="password" id="password" required placeholder="••••••••"
                    class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-red-500 transition-colors">
            </div>
            
            <button type="submit" id="loginBtn" class="w-full btn-primary mt-4 py-3">Login to Dashboard</button>
        </form>

        <div class="mt-8 pt-6 border-t border-white/10 text-center">
            <button id="adminToggle" class="text-xs text-gray-500 hover:text-white transition-colors">Switch to Admin Login</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script type="module">
        import { loginTeacher, loginAdmin } from './js/auth.js';
        import { initAnimations } from './js/app.js';
        
        initAnimations();

        let isAdminMode = false;
        const loginForm = document.getElementById('loginForm');
        const adminToggle = document.getElementById('adminToggle');
        const loginBtn = document.getElementById('loginBtn');

        adminToggle.addEventListener('click', () => {
            isAdminMode = !isAdminMode;
            adminToggle.innerText = isAdminMode ? 'Switch to Teacher Login' : 'Switch to Admin Login';
            loginBtn.innerText = isAdminMode ? 'Login as Admin' : 'Login to Dashboard';
            document.querySelector('h2').innerText = isAdminMode ? 'Admin Portal' : 'Staff Login';
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            loginBtn.innerText = 'Authenticating...';
            loginBtn.disabled = true;

            if (isAdminMode) {
                const result = loginAdmin(email, password);
                if (result.success) {
                    window.location.href = 'admin.html';
                } else {
                    alert(result.message);
                }
            } else {
                const result = await loginTeacher(email, password);
                if (result.success) {
                    window.location.href = 'teacher.html';
                } else {
                    alert(result.message);
                }
            }
            loginBtn.innerText = isAdminMode ? 'Login as Admin' : 'Login to Dashboard';
            loginBtn.disabled = false;
        });
    </script>
</body>
</html>
